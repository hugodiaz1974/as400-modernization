# ──────────────────────────────────────────────────────────────
# Configuración de Nginx para el Frontend
# Equivalente al servicio de pantallas 5250 del AS/400,
# pero sirviendo una interfaz web moderna
# ──────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name localhost;

    # Servir los archivos estáticos de React (HTML, JS, CSS)
    root /usr/share/nginx/html;
    index index.html;

    # Manejo de rutas de React (Single Page Application)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── PROXY INVERSO ──────────────────────────────────────
    # Todas las llamadas a /api/* se reenvían al contenedor del Backend
    # Esto es como un "Router" que conecta la pantalla con el programa COBOL
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
